# CI Pipeline for CFD Solver Benchmark
# Runs pytest suite and flake8 linting on every push/PR to main

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install flake8 pytest-html

      - name: Install heavy ML frameworks (optional)
        continue-on-error: true
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install torch-geometric || true
          pip install tensorflow-cpu || true

      - name: Lint with flake8
        run: |
          # Stop the build on syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings as informational (exit-zero so build continues)
          flake8 . --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --junitxml=test-results.xml -W ignore::DeprecationWarning

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results.xml

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: pytest (${{ matrix.python-version }})
          path: test-results.xml
          reporter: java-junit
